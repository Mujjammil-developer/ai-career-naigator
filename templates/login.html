{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <h3 class="text-white fw-700 mb-1">Welcome Back</h3>
    <p class="text-muted small mb-4">Login to your AI Career Navigator account</p>
    {% if error %}<div class="alert alert-danger py-2 small">{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="mb-3">
        <label class="form-label text-muted small">Email</label>
        <input type="email" name="email" class="form-control form-control-dark" required placeholder="you@email.com"/>
      </div>
      <div class="mb-4">
        <label class="form-label text-muted small">Password</label>
        <input type="password" name="password" class="form-control form-control-dark" required placeholder="••••••••"/>
      </div>
      <button type="submit" class="btn btn-primary-glow w-100">Login →</button>
    </form>
    <p class="text-center text-muted small mt-3">Don't have an account? <a href="/register" class="link-cyan">Register</a></p>
  </div>
</div>
{% endblock %}
