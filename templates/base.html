<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}AI Career Navigator{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
<meta name="google-site-verification" content="uiBmPSNlU7EfLevporkuAM_IkSrM_wfjLqC4XEiyOvk" />
</head>
<body>
{% if session.get('student_id') %}
<nav class="navbar navbar-expand-lg navbar-dark sticky-top" id="mainNav">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-800" href="/dashboard"><span class="brand-ai">AI</span> Career Navigator</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item"><a class="nav-link {% if request.endpoint=='dashboard' %}active{% endif %}" href="/dashboard">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link {% if request.endpoint=='careers' %}active{% endif %}" href="/careers">Careers</a></li>
        <li class="nav-item"><a class="nav-link {% if request.endpoint=='skillgap' %}active{% endif %}" href="/skillgap">Skill Gap</a></li>
        <li class="nav-item"><a class="nav-link {% if request.endpoint=='roadmap' %}active{% endif %}" href="/roadmap">Roadmap</a></li>
        <li class="nav-item"><a class="nav-link {% if request.endpoint=='chatbot' %}active{% endif %}" href="/chatbot">Chatbot</a></li>
        <li class="nav-item"><a class="nav-link {% if request.endpoint=='edit_profile' %}active{% endif %}" href="/edit_profile">✏️ Edit Profile</a></li>
        <li class="nav-item ms-2"><a class="btn btn-sm btn-outline-danger px-3" href="/logout">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>
{% endif %}
<main>{% block content %}{% endblock %}</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
