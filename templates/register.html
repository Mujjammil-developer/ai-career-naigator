{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="auth-wrapper" style="padding:40px 16px;">
  <div class="auth-card" style="max-width:560px;">
    <h3 class="text-white fw-700 mb-1">Create Your Profile</h3>
    <p class="text-muted small mb-4">Fill in your details to get personalized career guidance</p>
    {% if error %}<div class="alert alert-danger py-2 small">{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label text-muted small">Full Name</label>
          <input type="text" name="name" class="form-control form-control-dark" required placeholder="Arjun Sharma"/>
        </div>
        <div class="col-md-6">
          <label class="form-label text-muted small">Email</label>
          <input type="email" name="email" class="form-control form-control-dark" required placeholder="you@email.com"/>
        </div>
        <div class="col-md-6">
          <label class="form-label text-muted small">Password</label>
          <input type="password" name="password" class="form-control form-control-dark" required/>
        </div>
        <div class="col-md-6">
          <label class="form-label text-muted small">CGPA</label>
          <input type="number" name="cgpa" step="0.1" min="0" max="10" class="form-control form-control-dark" required placeholder="8.4"/>
        </div>
        <div class="col-md-6">
          <label class="form-label text-muted small">Degree</label>
          <input type="text" name="degree" class="form-control form-control-dark" value="B.Tech"/>
        </div>
        <div class="col-md-6">
          <label class="form-label text-muted small">Branch</label>
          <input type="text" name="branch" class="form-control form-control-dark" value="AI & Data Science"/>
        </div>
        <div class="col-12">
          <label class="form-label text-muted small">Skills <span class="text-cyan">(comma separated)</span></label>
          <input type="text" name="skills" class="form-control form-control-dark" placeholder="Python, SQL, Pandas, NumPy"/>
        </div>
        <div class="col-md-6">
          <label class="form-label text-muted small">Certifications</label>
          <input type="text" name="certifications" class="form-control form-control-dark" placeholder="Google ML, AWS..."/>
        </div>
        <div class="col-md-6">
          <label class="form-label text-muted small">Interests</label>
          <input type="text" name="interests" class="form-control form-control-dark" placeholder="Deep Learning, NLP..."/>
        </div>
        <div class="col-md-6">
          <label class="form-label text-muted small">Projects</label>
          <input type="text" name="projects" class="form-control form-control-dark" placeholder="Chatbot, Price Predictor..."/>
        </div>
        <div class="col-md-6">
          <label class="form-label text-muted small">Achievements</label>
          <input type="text" name="achievements" class="form-control form-control-dark" placeholder="Hackathon winner..."/>
        </div>
      </div>
      <button type="submit" class="btn btn-primary-glow w-100 mt-4">Create Account →</button>
    </form>
    <p class="text-center text-muted small mt-3">Already have an account? <a href="/login" class="link-cyan">Login</a></p>
  </div>
</div>
{% endblock %}
